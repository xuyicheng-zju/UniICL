# ========================================
# Stage 2: generation-focused (generation-heavy with understanding retention)
# ========================================
# Goal: strengthen generation-task ICL capability while preserving understanding performance.
# Resume from the stage-1 checkpoint with generation weights intact and understanding already warm-started.

# ========== Understanding tasks (JSONL format) ==========
vlm_sft_icl:
  dataset_names:
  - style_aware_caption_icl
  - scene_reasoning_icl
  - visual_grounding_icl
  - attribute_recognition_icl
  - forgery_detection_icl
  - aesthetic_assessment_icl
  - fast_concept_mapping_icl
  - world_aware_planning_icl
  - analogical_inference_icl

  image_transform_args:
    image_stride: 14
    max_image_size: 980
    min_image_size: 378
    max_pixels: 2_007_040
  frame_sampler_args:
    max_num_frames: 12
    min_num_frames: 8
  is_mandatory: true
  shuffle_lines: true
  shuffle_seed: 42
  num_used_data:
  - 10000  # style_aware_caption_icl
  - 30000  # scene_reasoning_icl
  - 3000   # visual_grounding_icl
  - 20000  # attribute_recognition_icl
  - 3000   # forgery_detection_icl
  - 3000   # aesthetic_assessment_icl
  - 20000  # fast_concept_mapping_icl
  - 3000   # world_aware_planning_icl
  - 3000   # analogical_inference_icl
  weight: 0.2  # Understanding retention to avoid catastrophic forgetting

# ========== Generation tasks (Parquet format) ==========
icl_gen:
  dataset_names:
  - instructional_generation_icl
  - image_manipulation_icl
  - analogical_editing
  - fast_concept_generation
  - visual_refinement
  image_transform_args:
    image_stride: 16
    max_image_size: 512    
    min_image_size: 256
  vit_image_transform_args:
    image_stride: 14
    max_image_size: 336
    min_image_size: 224
  is_mandatory: true
  num_used_data:
  - 50000  # instructional_generation_icl
  - 39201  # image_manipulation_icl
  - 18710  # analogical_editing
  - 50000  # fast_concept_generation
  - 27996  # visual_refinement
  weight: 1.0  # Generation-focused training weight
