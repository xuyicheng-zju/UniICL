# ========================================
# Stage 1: understanding-focused (understanding-heavy with light generation support)
# ========================================
# Goal: teach CAPM and the backbone the ICL patterns of understanding tasks.
# Keep generation active with a small weight so the generation head and MoE routing stay aligned.

# ========== Understanding tasks (JSONL format) ==========
vlm_sft_icl:
  dataset_names:
  - style_aware_caption_icl
  - scene_reasoning_icl
  - visual_grounding_icl
  - attribute_recognition_icl
  - forgery_detection_icl
  - aesthetic_assessment_icl
  - fast_concept_mapping_icl
  - world_aware_planning_icl
  - analogical_inference_icl

  image_transform_args:
    image_stride: 14
    max_image_size: 980
    min_image_size: 378
    max_pixels: 2_007_040
  frame_sampler_args:
    max_num_frames: 12
    min_num_frames: 8
  is_mandatory: true
  shuffle_lines: true
  shuffle_seed: 42
  num_used_data:
  - 50000  # style_aware_caption_icl
  - 50000  # scene_reasoning_icl
  - 25000  # visual_grounding_icl
  - 50000  # attribute_recognition_icl
  - 10000  # forgery_detection_icl
  - 25000  # aesthetic_assessment_icl
  - 50000  # fast_concept_mapping_icl
  - 10000  # world_aware_planning_icl
  - 30000  # analogical_inference_icl
  weight: 1.0  # Understanding-focused training weight
